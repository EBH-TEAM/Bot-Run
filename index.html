        * {

            padding: 0;
            box-sizing: border-box;
        }

        body {

            padding: 20px;

        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;

        }

        .container {

            z-index: 1;
        }

        .header-card {
            background: linear-gradient(145deg, rgba(26, 31, 46, 0.95), rgba(18, 22, 38, 0.98));
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 28px 22px;
            text-align: center;
            margin-bottom: 22px;
            border: 1px solid rgba(255,215,0,0.35);
            box-shadow: 0 25px 45px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);

        .logo {
            font-size: 44px;
            font-weight: 900;
            background: linear-gradient(135deg, #ffd700, #ffaa33, #ff9933);

            background-clip: text;

            text-shadow: 0 2px 10px rgba(255,215,0,0.2);

        .section-title {
            color: #ffd700;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 4px solid #ffd700;
            padding-left: 14px;
        }

        .input-group {
            margin-bottom: 22px;
        }

        .input-label {
            display: block;
            color: #e0e0e0;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;

            border-radius: 32px;
            font-size: 14px;
            color: #fff;
            font-family: inherit;
            transition: all 0.25s ease;

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 0 3px rgba(255,215,0,0.15);
            background: #12172a;
        }

        textarea {
            resize: vertical;
            min-height: 200px;
            line-height: 1.6;
        }

        .shortcut-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .shortcut-btn {
            background: linear-gradient(145deg, rgba(255,215,0,0.12), rgba(255,215,0,0.05));
            border: 1px solid rgba(255,215,0,0.35);
            border-radius: 40px;
            padding: 12px 8px;
            font-size: 13px;
            font-weight: 600;
            color: #ffd700;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .shortcut-btn:hover {
            background: rgba(255,215,0,0.2);
            transform: translateY(-2px);
            border-color: #ffd700;
        }

        .shortcut-btn:active {
            transform: scale(0.97);
        }

        .btn {
            width: 100%;
            padding: 16px 20px;
            border: none;
            border-radius: 48px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(145deg, #ffd700, #ffaa33);
            color: #1a1e2b;
            box-shadow: 0 8px 0 #b27d00;
            margin-top: 8px;
        }

        .btn-primary:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #b27d00;
        }

        .btn-primary:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
            box-shadow: 0 8px 0 #b27d00;
        }

        .preview-card {
            background: rgba(0, 0, 0, 0.35);
            border-radius: 28px;
            padding: 18px;
            margin-top: 24px;
            border: 1px solid rgba(255,215,0,0.2);
        }

        .preview-title {
            color: #ffd700;
            font-size: 12px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.5px;
        }

        .preview-content {
            background: #0a0e1a;
            border-radius: 24px;
            padding: 18px;
            font-size: 13px;
            color: #ddd;
            line-height: 1.65;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .inline-button-preview {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px dashed rgba(255,215,0,0.25);
            text-align: center;
        }

        .channel-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: rgba(76, 175, 80, 0.12);
            padding: 10px 18px;
            border-radius: 60px;
            font-size: 12px;
            margin-bottom: 22px;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #4CAF50;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: #1e2338;
            color: white;
            padding: 14px 20px;
            border-radius: 50px;
            text-align: center;
            transform: translateY(150%);
            transition: 0.3s;
            z-index: 1000;
            border-left: 5px solid;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            max-width: 450px;
            margin: 0 auto;
            font-size: 14px;
        }

        .toast.show {
            transform: translateY(0);
        }

        .toast.success { border-left-color: #4CAF50; }
        .toast.error { border-left-color: #f44336; }
        .toast.warning { border-left-color: #ffd700; }

        .footer-info {
            background: rgba(22, 27, 42, 0.7);
            border-radius: 32px;
            padding: 18px;
        }

        .footer-info p {
            color: #aaa;
            font-size: 12px;
            line-height: 1.6;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .clear-btn {
            background: rgba(255, 100, 100, 0.2);
            border-color: rgba(255, 100, 100, 0.5);
            color: #ff8888;
        }
        
        .clear-btn:hover {
            background: rgba(255, 100, 100, 0.3);
        }

    <script>

        const CHANNEL_ID = '-1002272448528';
        
        // শর্টকাট মেসেজ টেমপ্লেট
        const templates = {
            instagram_work: {

`,

            file_submit: {

📂 সবাই ফাইল জমা দিতে থাকেন 📩

⚠️ ফাইল জমা না দিলে রিপোর্ট পেমেন্ট পাবেন না ⚠️

📤 File Submit করতে নিচের Button এ ক্লিক করুন 👇`,
                link: 'https://ebh-team.github.io/Payment/',
                buttonText: '📥 ফাইল সাবমিট করুন ♻️'
            },
            report_check: {
                title: '📊 ২০ তারিখের ইনস্টাগ্রাম কুকিজ রিপোর্ট',
                content: `রিপোর্ট পুরাই আগুন 💯💥

💸💸 All Payment running ✅✅

📑 রিপোর্ট চেক করতে ক্লিক করুন 👇`,
                link: 'https://ebh-team.github.io/Report_Chack/',
                buttonText: '📤 রিপোর্ট চেক করুন ♻️'
            },
            payment_clear: {
                title: '📅 ২১ মার্চ ২০২৬',
                content: `✅ All Report Payment Clear 💸

📊 সকল রিপোর্টের পেমেন্ট হিসাব সম্পূর্ণভাবে ক্লিয়ার করা হয়েছে।  

যাদের রিপোর্ট ছিল, তাদের সব পেমেন্ট চেক করে পরিশোধ করা হয়েছে।

ধন্যবাদ সবাইকে সহযোগিতার জন্য 🤝`,
                link: '',
                buttonText: ''
            }
        };
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function formatPostMessage(title, content) {
            let message = '';
            
            // টাইটেল যোগ করা
            if (title && title.trim()) {
                message += `<b>${escapeHtml(title.trim())}</b>\n`;
                message += `━━━━━━━━━━━━━━━━━━━━━\n`;
            }
            
            // কন্টেন্ট যোগ করা (প্রতিটি লাইন বোল্ড)
            const lines = content.split('\n');
            const boldLines = lines.map(line => {
                if (line.trim() === '') return '';
                return `<b>${escapeHtml(line)}</b>`;
            });
            message += boldLines.join('\n');
            
            // ফুটার যোগ করা
            message += `\n\n━━━━━━━━━━━━━━━━━━━━━\n<b>✨ EBH TEAM - Earning By Habib ✨</b>`;
            
            return message;
        }
        
        function updatePreview() {
            const title = document.getElementById('postTitle').value;
            let content = document.getElementById('postContent').value;
            const link = document.getElementById('postLink').value.trim();
            const buttonTxt = document.getElementById('buttonText').value.trim();
            
            // প্রিভিউ কন্টেন্ট তৈরি
            let previewHTML = '';
            
            if (title && title.trim()) {
                previewHTML += `<div style="font-weight: bold; color: #ffd700; margin-bottom: 8px;">${escapeHtml(title)}</div>`;
                previewHTML += `<div style="border-top: 1px dashed rgba(255,215,0,0.3); margin: 8px 0;"></div>`;
            }
            
            const lines = content.split('\n');
            const boldPreview = lines.map(line => {
                if (line.trim() === '') return '<br>';
                return `<div style="font-weight: bold; margin-bottom: 4px; color: #fff;">${escapeHtml(line)}</div>`;
            }).join('');
            
            previewHTML += boldPreview;
            previewHTML += `<div style="margin-top: 12px; border-top: 1px dashed rgba(255,215,0,0.3); padding-top: 8px;"></div>`;
            previewHTML += `<div style="font-weight: bold; color: #ffd700; margin-top: 8px;">✨ EBH TEAM - Earning By Habib ✨</div>`;
            
            document.getElementById('previewContent').innerHTML = previewHTML;
            
            // বাটন প্রিভিউ
            const previewBtnArea = document.getElementById('previewButtonArea');
            if (link && buttonTxt) {
                previewBtnArea.style.display = 'block';
                previewBtnArea.innerHTML = `
                    <div style="margin-top: 12px; text-align: center;">
                        <div style="display: inline-flex; align-items: center; gap: 8px; background: #ffd700; color: #1a1e2b; padding: 10px 22px; border-radius: 40px; font-weight: bold; font-size: 14px;">
                            <i class="fas fa-hand-pointer"></i> ${escapeHtml(buttonTxt)}
                        </div>
                        <div style="font-size: 11px; color: #ffd700; margin-top: 8px; word-break: break-all;">
                            🔗 লিংক: ${escapeHtml(link)}
                        </div>
                    </div>
                `;
            } else {
                previewBtnArea.style.display = 'none';
            }
        }
        
        window.loadTemplate = function(templateName) {
            const template = templates[templateName];
            if (template) {
                document.getElementById('postTitle').value = template.title;
                document.getElementById('postContent').value = template.content;
                document.getElementById('postLink').value = template.link || '';
                document.getElementById('buttonText').value = template.buttonText || '';
                updatePreview();
                
                let msg = '';
                if (templateName === 'instagram_work') msg = 'ইনস্টাগ্রাম ওয়ার্ক টেমপ্লেট লোড হয়েছে';
                else if (templateName === 'file_submit') msg = 'ফাইল সাবমিট টেমপ্লেট লোড হয়েছে';
                else if (templateName === 'report_check') msg = 'রিপোর্ট চেক টেমপ্লেট লোড হয়েছে';
                else if (templateName === 'payment_clear') msg = 'পেমেন্ট ক্লিয়ার টেমপ্লেট লোড হয়েছে';
                
                showToast(msg, 'success');
            }
        };
        
        window.clearAllFields = function() {
            document.getElementById('postTitle').value = '';
            document.getElementById('postContent').value = '';
            document.getElementById('postLink').value = '';
            document.getElementById('buttonText').value = '';
            updatePreview();
            showToast('সব ফিল্ড ফাঁকা করা হয়েছে', 'success');
        };
        
        window.sendToChannel = async function() {
            const sendBtn = document.getElementById('sendBtn');
            const title = document.getElementById('postTitle').value.trim();
            let content = document.getElementById('postContent').value.trim();
            const link = document.getElementById('postLink').value.trim();
            const buttonText = document.getElementById('buttonText').value.trim();
            
            if (!content) {
                showToast('পোস্ট কন্টেন্ট লিখুন', 'warning');
                return;
            }
            
            // ফরম্যাট করা মেসেজ তৈরি
            let textMessage = formatPostMessage(title, content);
            
            // বাটন তৈরি
            let replyMarkup = null;
            if (link && buttonText) {
                let buttonObject = {
                    text: buttonText,
                    url: link
                };
                
                replyMarkup = {
                    inline_keyboard: [[buttonObject]]
                };
            }
            
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> পোস্ট হচ্ছে...';
            
            try {
                const payload = {
                    chat_id: CHANNEL_ID,
                    text: textMessage,
                    parse_mode: 'HTML'
                };
                
                if (replyMarkup) {
                    payload.reply_markup = JSON.stringify(replyMarkup);
                    console.log('সেন্ড করা হচ্ছে:', JSON.stringify(replyMarkup, null, 2));
                }
                
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                console.log('API Response:', result);
                
                if (result.ok) {
                    showToast(`✅ পোস্ট সফল!`, 'success');
                } else {
                    let err = result.description || 'অজানা ত্রুটি';
                    if (err.includes('chat not found')) err = 'চ্যানেল খুঁজে পাওয়া যায়নি। বট কি অ্যাডমিন?';
                    else if (err.includes('bot was blocked')) err = 'বট চ্যানেল থেকে ব্লক করা হয়েছে';
                    else if (err.includes('can\'t parse')) err = 'লিংকে সমস্যা আছে। সঠিক URL দিন';
                    showToast(`❌ ব্যর্থ: ${err}`, 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast(`❌ নেটওয়ার্ক সমস্যা: ${error.message}`, 'error');
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerHTML = '<i class="fas fa-telegram-plane"></i> চ্যানেলে পোস্ট করুন';
            }
        };
        
        function showToast(msg, type) {
            const toast = document.getElementById('toast');
            toast.className = `toast ${type} show`;
            toast.innerHTML = msg;
            setTimeout(() => toast.classList.remove('show'), 3500);
        }
        
        // ইভেন্ট লিসেনার
        document.getElementById('postTitle').addEventListener('input', updatePreview);
        document.getElementById('postContent').addEventListener('input', updatePreview);
        document.getElementById('postLink').addEventListener('input', updatePreview);
        document.getElementById('buttonText').addEventListener('input', updatePreview);
        
        // ডিফল্ট: সব ফিল্ড ফাঁকা থাকবে
        clearAllFields();
    </script>
</body>
</html>
